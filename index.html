<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kontactic Brand Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #222;
    --border: #2e2e2e; --border2: #3a3a3a;
    --text: #f0f0f0; --text2: #888; --text3: #555;
    --accent: #e8ff5a; --font-mono: 'DM Mono', monospace; --font: 'DM Sans', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; min-height: 100vh; }

  header {
    border-bottom: 1px solid var(--border); padding: 20px 32px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; background: var(--bg); z-index: 100;
  }
  .logo { font-family: var(--font-mono); font-size: 13px; color: var(--accent); letter-spacing: 0.05em; }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .stats { display: flex; gap: 20px; }
  .stat { text-align: right; }
  .stat-num { font-family: var(--font-mono); font-size: 18px; font-weight: 500; line-height: 1; }
  .stat-label { font-size: 11px; color: var(--text3); margin-top: 2px; letter-spacing: 0.05em; text-transform: uppercase; }
  .add-btn { background: var(--accent); color: #0f0f0f; border: none; padding: 8px 16px; font-family: var(--font-mono); font-size: 12px; font-weight: 500; cursor: pointer; letter-spacing: 0.05em; transition: opacity 0.15s; }
  .add-btn:hover { opacity: 0.85; }

  .sync-status { font-family: var(--font-mono); font-size: 11px; color: var(--text3); }
  .sync-status.ok { color: #5aff8c; }
  .sync-status.err { color: #ff5a5a; }
  .sync-status.loading { color: var(--accent); }

  main { padding: 32px; max-width: 1300px; margin: 0 auto; }

  .filters { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; align-items: center; }
  .filter-btn { background: none; border: 1px solid var(--border); color: var(--text2); padding: 6px 14px; font-family: var(--font-mono); font-size: 11px; cursor: pointer; letter-spacing: 0.05em; transition: all 0.15s; }
  .filter-btn:hover, .filter-btn.active { border-color: var(--accent); color: var(--accent); }
  .search-input { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 6px 14px; font-family: var(--font-mono); font-size: 11px; outline: none; width: 180px; margin-left: auto; }
  .search-input:focus { border-color: var(--border2); }
  .search-input::placeholder { color: var(--text3); }

  table { width: 100%; border-collapse: collapse; }
  thead tr { border-bottom: 1px solid var(--border); }
  th { font-family: var(--font-mono); font-size: 10px; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; padding: 0 12px 12px; text-align: left; font-weight: 400; }
  th:first-child { padding-left: 0; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; cursor: pointer; }
  tbody tr:hover { background: var(--surface); }
  td { padding: 14px 12px; vertical-align: middle; }
  td:first-child { padding-left: 0; }

  .brand-name { font-weight: 500; font-size: 14px; }
  .brand-category { font-size: 11px; color: var(--text3); margin-top: 2px; font-family: var(--font-mono); }
  .status-badge { display: inline-block; padding: 3px 10px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.05em; font-weight: 500; }
  .status-research   { background: rgba(136,136,136,0.12); color: #888; }
  .status-email-sent { background: rgba(232,255,90,0.1);   color: #e8ff5a; }
  .status-replied    { background: rgba(90,200,255,0.1);   color: #5ac8ff; }
  .status-meeting    { background: rgba(180,90,255,0.1);   color: #b45aff; }
  .status-closed-won { background: rgba(90,255,140,0.1);   color: #5aff8c; }
  .status-skip       { background: rgba(255,90,90,0.08);   color: #555; }

  .demand-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
  .demand-yes { background: #5aff8c; } .demand-no { background: #555; } .demand-unknown { background: #444; }

  .action-links { display: flex; gap: 6px; }
  .action-link { font-family: var(--font-mono); font-size: 10px; color: var(--text3); text-decoration: none; padding: 3px 8px; border: 1px solid var(--border); transition: all 0.15s; white-space: nowrap; }
  .action-link:hover { border-color: var(--accent); color: var(--accent); }
  .notes-text { font-size: 12px; color: var(--text2); max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .date-text { font-family: var(--font-mono); font-size: 11px; color: var(--text3); }
  .empty-state { text-align: center; padding: 80px 0; color: var(--text3); font-family: var(--font-mono); font-size: 12px; line-height: 2; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border2); width: 520px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
  .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .modal-title { font-family: var(--font-mono); font-size: 12px; color: var(--accent); letter-spacing: 0.05em; }
  .modal-close { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 18px; line-height: 1; }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 24px; display: grid; gap: 16px; }
  .form-group { display: grid; gap: 6px; }
  .form-group label { font-family: var(--font-mono); font-size: 10px; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; }
  .form-group input, .form-group select, .form-group textarea { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 9px 12px; font-family: var(--font); font-size: 13px; outline: none; width: 100%; transition: border-color 0.15s; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--border2); }
  .form-group select option { background: var(--surface); }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
  .btn-cancel { background: none; border: 1px solid var(--border); color: var(--text2); padding: 8px 16px; font-family: var(--font-mono); font-size: 11px; cursor: pointer; transition: all 0.15s; }
  .btn-cancel:hover { border-color: var(--border2); color: var(--text); }
  .btn-save { background: var(--accent); border: none; color: #0f0f0f; padding: 8px 20px; font-family: var(--font-mono); font-size: 11px; font-weight: 500; cursor: pointer; transition: opacity 0.15s; }
  .btn-save:hover { opacity: 0.85; }
  .btn-delete { background: none; border: 1px solid #3a1a1a; color: #ff5a5a; padding: 8px 16px; font-family: var(--font-mono); font-size: 11px; cursor: pointer; margin-right: auto; transition: all 0.15s; }
  .btn-delete:hover { background: rgba(255,90,90,0.08); }

  .check-links { display: grid; gap: 6px; margin-top: 4px; }
  .check-link { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border: 1px solid var(--border); text-decoration: none; color: var(--text2); font-size: 12px; transition: all 0.15s; }
  .check-link:hover { border-color: var(--accent); color: var(--accent); }
  .check-link span { font-family: var(--font-mono); font-size: 10px; color: var(--text3); }
</style>
</head>
<body>

<header>
  <div class="logo">KONTACTIC / BRAND PIPELINE</div>
  <div class="header-right">
    <div class="stats">
      <div class="stat"><div class="stat-num" id="stat-total">—</div><div class="stat-label">Total</div></div>
      <div class="stat"><div class="stat-num" id="stat-active">—</div><div class="stat-label">Active</div></div>
      <div class="stat"><div class="stat-num" id="stat-replied">—</div><div class="stat-label">Replied</div></div>
    </div>
    <div class="sync-status loading" id="syncStatus">connecting...</div>
    <button class="add-btn" onclick="openModal()">+ ADD BRAND</button>
  </div>
</header>

<main>
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all',this)">ALL</button>
    <button class="filter-btn" onclick="setFilter('research',this)">RESEARCH</button>
    <button class="filter-btn" onclick="setFilter('email-sent',this)">EMAIL SENT</button>
    <button class="filter-btn" onclick="setFilter('replied',this)">REPLIED</button>
    <button class="filter-btn" onclick="setFilter('meeting',this)">MEETING</button>
    <button class="filter-btn" onclick="setFilter('closed-won',this)">CLOSED WON</button>
    <button class="filter-btn" onclick="setFilter('skip',this)">SKIP</button>
    <input class="search-input" type="text" placeholder="SEARCH..." id="searchInput" oninput="renderTable()" />
  </div>
  <table>
    <thead>
      <tr>
        <th>Brand</th><th>Status</th><th>Coupang demand</th>
        <th>Contact</th><th>Notes</th><th>Updated</th><th>Check</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
  <div class="empty-state" id="emptyState" style="display:none;">No brands yet.<br>Click + ADD BRAND to get started.</div>
</main>

<div class="modal-overlay" id="modalOverlay" onmousedown="handleOverlayMouseDown(event)" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">ADD BRAND</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editId" />
      <div class="form-row">
        <div class="form-group"><label>Brand Name *</label><input type="text" id="fName" placeholder="예: Chomps" /></div>
        <div class="form-group"><label>Category</label><input type="text" id="fCategory" placeholder="예: F&B, Beauty..." /></div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Status</label>
          <select id="fStatus">
            <option value="research">Research</option>
            <option value="email-sent">Email Sent</option>
            <option value="replied">Replied</option>
            <option value="meeting">Meeting</option>
            <option value="closed-won">Closed Won</option>
            <option value="skip">Skip</option>
          </select>
        </div>
        <div class="form-group">
          <label>Coupang demand</label>
          <select id="fDemand">
            <option value="unknown">Unknown</option>
            <option value="yes">Yes (직구 있음)</option>
            <option value="no">No (없음)</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label>Contact Email</label><input type="text" id="fContact" placeholder="예: wholesale@brand.com" /></div>
      <div class="form-group"><label>Notes</label><textarea id="fNotes" placeholder="공식 유통 현황, 특이사항 등..."></textarea></div>
      <div class="form-group">
        <label>빠른 검색 링크</label>
        <div class="check-links" id="checkLinks"><div style="font-size:11px;color:var(--text3);font-family:var(--font-mono);">브랜드 이름 입력 후 링크가 생성됩니다</div></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-delete" id="deleteBtn" onclick="deleteBrand()" style="display:none;">DELETE</button>
      <button class="btn-cancel" onclick="closeModal()">CANCEL</button>
      <button class="btn-save" onclick="saveBrand()">SAVE</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://axmbsqifforvxwozqhzq.supabase.co';
const SUPABASE_KEY = 'sb_publishable_gSiDruL6p0RttnjaAeJ90Q_iYLVbkSd';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let brands = [];
let currentFilter = 'all';
let editingId = null;

const STATUS_LABEL = {
  'research':'리서치 중','email-sent':'이메일 발송','replied':'답장 받음',
  'meeting':'미팅','closed-won':'계약 완료','skip':'SKIP'
};

async function loadBrands() {
  setSync('loading', 'loading...');
  const { data, error } = await db.from('brands').select('*').order('created_at', { ascending: false });
  if (error) { setSync('err', 'DB 연결 오류'); console.error(error); return; }
  brands = data;
  setSync('ok', 'synced');
  updateStats();
  renderTable();
}

function setSync(cls, text) {
  const el = document.getElementById('syncStatus');
  el.className = 'sync-status ' + cls;
  el.textContent = text;
}

function updateStats() {
  document.getElementById('stat-total').textContent = brands.filter(b => b.status !== 'skip').length;
  document.getElementById('stat-active').textContent = brands.filter(b => ['email-sent','research'].includes(b.status)).length;
  document.getElementById('stat-replied').textContent = brands.filter(b => ['replied','meeting'].includes(b.status)).length;
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderTable();
}

function renderTable() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const list = brands.filter(b => {
    const mf = currentFilter === 'all' || b.status === currentFilter;
    const ms = !q || b.name.toLowerCase().includes(q) || (b.category||'').toLowerCase().includes(q);
    return mf && ms;
  });

  const tbody = document.getElementById('tableBody');
  const empty = document.getElementById('emptyState');

  if (list.length === 0) { tbody.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  tbody.innerHTML = list.map(b => `
    <tr onclick="openModal('${b.id}')">
      <td><div class="brand-name">${b.name}</div><div class="brand-category">${b.category||'—'}</div></td>
      <td><span class="status-badge status-${b.status}">${STATUS_LABEL[b.status]}</span></td>
      <td><span class="demand-dot demand-${b.demand||'unknown'}"></span><span style="font-size:12px;color:var(--text2);">${b.demand==='yes'?'있음':b.demand==='no'?'없음':'미확인'}</span></td>
      <td style="font-size:12px;color:var(--text2);font-family:var(--font-mono);">${b.contact||'—'}</td>
      <td><div class="notes-text">${b.notes||'—'}</div></td>
      <td><div class="date-text">${b.updated_at?b.updated_at.slice(0,10):'—'}</div></td>
      <td><div class="action-links" onclick="event.stopPropagation()">
        <a class="action-link" href="https://www.coupang.com/np/search?q=${encodeURIComponent(b.name)}" target="_blank">쿠팡</a>
        <a class="action-link" href="https://search.shopping.naver.com/search/all?query=${encodeURIComponent(b.name)}" target="_blank">네이버</a>
      </div></td>
    </tr>
  `).join('');
}

function openModal(id) {
  editingId = id || null;
  document.getElementById('modalOverlay').classList.add('open');
  if (id) {
    const b = brands.find(x => x.id === id);
    document.getElementById('modalTitle').textContent = 'EDIT BRAND';
    document.getElementById('editId').value = id;
    document.getElementById('fName').value = b.name;
    document.getElementById('fCategory').value = b.category||'';
    document.getElementById('fStatus').value = b.status;
    document.getElementById('fDemand').value = b.demand||'unknown';
    document.getElementById('fContact').value = b.contact||'';
    document.getElementById('fNotes').value = b.notes||'';
    document.getElementById('deleteBtn').style.display = 'block';
    updateCheckLinks(b.name);
  } else {
    document.getElementById('modalTitle').textContent = 'ADD BRAND';
    ['editId','fName','fCategory','fContact','fNotes'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('fStatus').value = 'research';
    document.getElementById('fDemand').value = 'unknown';
    document.getElementById('deleteBtn').style.display = 'none';
    document.getElementById('checkLinks').innerHTML = '<div style="font-size:11px;color:var(--text3);font-family:var(--font-mono);">브랜드 이름 입력 후 링크가 생성됩니다</div>';
  }
}

document.getElementById('fName').addEventListener('input', function() { updateCheckLinks(this.value); });

function updateCheckLinks(name) {
  if (!name.trim()) return;
  const enc = encodeURIComponent(name);
  document.getElementById('checkLinks').innerHTML = `
    <a class="check-link" href="https://www.coupang.com/np/search?q=${enc}" target="_blank">쿠팡 검색 <span>→</span></a>
    <a class="check-link" href="https://search.shopping.naver.com/search/all?query=${enc}" target="_blank">네이버 쇼핑 <span>→</span></a>
    <a class="check-link" href="https://search.naver.com/search.naver?where=blog&query=${encodeURIComponent(name+' 직구')}" target="_blank">네이버 블로그 (직구 후기) <span>→</span></a>
    <a class="check-link" href="https://www.google.com/search?q=${encodeURIComponent(name+' Korea official distributor')}" target="_blank">구글 (공식 유통사) <span>→</span></a>
  `;
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); editingId = null; }
let _mouseDownOnOverlay = false;
function handleOverlayMouseDown(e) { _mouseDownOnOverlay = e.target === document.getElementById('modalOverlay'); }
function handleOverlayClick(e) { if (_mouseDownOnOverlay && e.target === document.getElementById('modalOverlay')) closeModal(); }

async function saveBrand() {
  const name = document.getElementById('fName').value.trim();
  if (!name) { alert('브랜드 이름을 입력하세요'); return; }
  const data = {
    name, category: document.getElementById('fCategory').value.trim(),
    status: document.getElementById('fStatus').value,
    demand: document.getElementById('fDemand').value,
    contact: document.getElementById('fContact').value.trim(),
    notes: document.getElementById('fNotes').value.trim()
  };
  setSync('loading', 'saving...');
  if (editingId) {
    const { error } = await db.from('brands').update(data).eq('id', editingId);
    if (error) { setSync('err', '저장 실패'); return; }
  } else {
    const { error } = await db.from('brands').insert(data);
    if (error) { setSync('err', '저장 실패'); return; }
  }
  closeModal();
  await loadBrands();
}

async function deleteBrand() {
  if (!confirm('삭제할까요?')) return;
  setSync('loading', 'deleting...');
  const { error } = await db.from('brands').delete().eq('id', editingId);
  if (error) { setSync('err', '삭제 실패'); return; }
  closeModal();
  await loadBrands();
}

loadBrands();
</script>
</body>
</html>
